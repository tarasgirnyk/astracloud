services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: astracloud
    ports:
      # Host port 5433 (not 5432) — an unrelated project's Postgres already
      # occupies 5432 on this machine.
      - '5433:5432'
    volumes:
      - astracloud_postgres_data:/var/lib/postgresql/data

volumes:
  astracloud_postgres_data:
