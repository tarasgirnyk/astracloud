name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astracloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/astracloud
      PAYLOAD_SECRET: ci-only-not-a-real-secret
      HOSTBILL_API_URL: https://cp.astra.in.ua/admin/api.php
      HOSTBILL_PORTAL_READONLY_API_ID: ci-placeholder
      HOSTBILL_PORTAL_READONLY_API_KEY: ci-placeholder
      HOSTBILL_WEBHOOK_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (includes eslint-plugin-boundaries)
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/typescript

      - name: Build
        run: pnpm build
