<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:20px;background:#fff;display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:10px}
.bar{background:var(--brand-primary);height:14px;border-radius:4px}
.label{font:var(--text-caption);color:var(--gray-500);width:70px}
</style>
</head>
<body>
  <div class="row"><span class="label">4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="label">8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="label">16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="label">24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="label">32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="label">48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="label">64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="label">96</span><div class="bar" style="width:96px"></div></div>
</body>
</html>
