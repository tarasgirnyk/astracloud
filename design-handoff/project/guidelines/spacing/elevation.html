<!-- @dsCard group="Spacing" viewport="700x180" name="Card elevation" subtitle="Soft shadow on light; glow on dark" -->
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;background:var(--paper);display:flex;gap:20px}
.card{background:var(--surface-card);border-radius:var(--radius-lg);width:160px;height:100px;display:flex;align-items:center;justify-content:center;font:var(--text-caption);color:var(--gray-500)}
.dark{background:var(--navy-900);padding:24px;display:flex;gap:20px;border-radius:var(--radius-lg)}
.dcard{background:var(--navy-800);border-radius:var(--radius-lg);width:160px;height:100px;display:flex;align-items:center;justify-content:center;font:var(--text-caption);color:#fff}
</style>
</head>
<body>
  <div class="card" style="box-shadow:var(--shadow-card)">shadow-card</div>
  <div class="card" style="box-shadow:var(--shadow-card-hover)">shadow-hover</div>
  <div class="dcard" style="box-shadow:var(--glow-cyan)">glow-cyan</div>
</body>
</html>
