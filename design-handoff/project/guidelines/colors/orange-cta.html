<!-- @dsCard group="Colors" viewport="700x160" name="Orange — primary CTA" subtitle="The one accent that appears on both light and dark" -->
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
  .row{display:flex;gap:8px}
  .sw{flex:1;height:70px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:8px;color:#fff;font:600 12px/1 var(--font-body)}
  .demo{display:flex;gap:12px;margin-top:14px;align-items:center}
  .btn{background:var(--gradient-orange);color:#fff;border:none;border-radius:var(--radius-pill);padding:12px 24px;font:var(--text-button)}
  .btn2{background:var(--navy-950);color:#fff;border-radius:var(--radius-pill);padding:12px 24px;font:var(--text-button);border:none}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--orange-300);color:#3a1c00">300</div>
    <div class="sw" style="background:var(--orange-400)">400</div>
    <div class="sw" style="background:var(--orange-500)">500 · brand-primary</div>
    <div class="sw" style="background:var(--orange-600)">600 · hover</div>
    <div class="sw" style="background:var(--orange-700)">700 · active</div>
  </div>
  <div class="demo">
    <button class="btn">Спробувати</button>
    <button class="btn2">На темному теж</button>
  </div>
</body>
</html>
