<!-- @dsCard group="Colors" viewport="700x220" name="Navy scale" subtitle="Dark-section base, deep gradient" -->
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
  .row{display:flex;gap:8px}
  .sw{flex:1;height:80px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:8px;color:#fff;font:var(--text-caption)}
  .grad{height:60px;border-radius:var(--radius-md);margin-top:10px;background:var(--gradient-navy)}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--navy-950)">950</div>
    <div class="sw" style="background:var(--navy-900)">900</div>
    <div class="sw" style="background:var(--navy-800)">800</div>
    <div class="sw" style="background:var(--navy-700)">700</div>
    <div class="sw" style="background:var(--navy-600)">600</div>
    <div class="sw" style="background:var(--navy-500)">500</div>
  </div>
  <div class="grad"></div>
</body>
</html>
