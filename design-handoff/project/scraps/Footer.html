<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Astra Cloud — Footer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    /* Navy (dark section base) */
    --navy-950: #05070f;
    --navy-900: #0a0e1f;
    --navy-800: #10162e;

    /* Neutrals */
    --white: #ffffff;
    --gray-500: #6c6e78;

    /* Semantic: text */
    --text-on-dark: var(--white);
    --text-on-dark-muted: #aeb3c8;

    /* Semantic: borders */
    --border-on-dark: rgba(255, 255, 255, 0.12);

    /* Fonts */
    --font-display: "Unbounded", "Manrope", sans-serif;
    --font-body: "Inter", "Golos Text", sans-serif;

    --text-body-sm: 400 0.9375rem/1.5 var(--font-body);
    --text-caption: 500 0.8125rem/1.4 var(--font-body);
    --text-ui-label: 600 0.9375rem/1.3 var(--font-body);

    /* Spacing (4px base) */
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-16: 64px;

    /* Layout */
    --container-max: 1200px;
    --container-padding: 20px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: var(--font-body);
    background: var(--navy-900);
    -webkit-font-smoothing: antialiased;
  }

  p { margin: 0; }

  .ac-container {
    max-width: var(--container-max);
    margin: 0 auto;
    padding-left: var(--container-padding);
    padding-right: var(--container-padding);
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 1.3fr 1fr 1fr 1fr;
    gap: var(--space-10);
    padding-bottom: var(--space-10);
    border-bottom: 1px solid var(--border-on-dark);
  }

  .footer-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
    font: var(--text-body-sm);
    color: var(--text-on-dark-muted);
  }

  .footer-col-title {
    color: var(--text-on-dark);
    font: var(--text-ui-label);
    margin-bottom: 4px;
  }

  .footer-col a {
    color: inherit;
    text-decoration: none;
  }
  .footer-col a:hover {
    color: var(--text-on-dark);
  }

  .footer-copyright {
    font: var(--text-caption);
    color: var(--gray-500);
    text-align: center;
    padding-top: var(--space-6);
  }

  @media (max-width: 768px) {
    .footer-grid {
      grid-template-columns: 1fr !important;
      gap: var(--space-8) !important;
    }
  }
</style>
</head>
<body>

<footer style="background:var(--navy-950); padding:var(--space-16) 0 var(--space-10);">
  <div class="ac-container">
    <div class="footer-grid">
      <div>
        <img src="../assets/logo/astra-cloud-logo.png" alt="Astra Cloud" style="height:28px; margin-bottom:14px;">
        <p style="font:var(--text-body-sm); color:var(--text-on-dark-muted);">Україна, м. Львів.</p>
      </div>
      <div class="footer-col">
        <span class="footer-col-title">Клієнтам</span>
        <a href="#">Про нас</a>
        <a href="#">Умови користування</a>
        <a href="#">Політика конфіденційності</a>
        <a href="#">Політика повернення коштів</a>
      </div>
      <div class="footer-col">
        <span class="footer-col-title">Legal</span>
        <a href="#">SLA</a>
        <a href="#">Legal Section</a>
      </div>
      <div class="footer-col">
        <span class="footer-col-title">Контакти</span>
        <span>063 636 3448</span>
        <span>cloud@astra.in.ua</span>
        <span>abuse@astra.in.ua</span>
      </div>
    </div>
    <p class="footer-copyright">© 2026 Astra Cloud. Всі права захищені.</p>
  </div>
</footer>

</body>
</html>
