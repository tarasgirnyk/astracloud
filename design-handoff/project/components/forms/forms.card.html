<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-body)}
.row{display:flex;gap:20px;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Radio, Switch } = window.AstraCloudDesignSystem_7d4ce1;
function Demo() {
  const [agree, setAgree] = React.useState(true);
  const [period, setPeriod] = React.useState('monthly');
  const [yearly, setYearly] = React.useState(false);
  return (
    <div>
      <div className="row">
        <Input label="Email" placeholder="you@company.com" style={{width:220}}/>
        <Input label="Телефон" error="Обов'язкове поле" style={{width:220}}/>
        <Select label="Валюта" options={[{value:'uah',label:'UAH'},{value:'usd',label:'USD'},{value:'eur',label:'EUR'}]} style={{width:160}}/>
      </div>
      <div className="row">
        <Checkbox label="Погоджуюсь з умовами" checked={agree} onChange={setAgree} />
        <Radio label="Щомісяця" checked={period==='monthly'} onChange={() => setPeriod('monthly')} />
        <Radio label="Щорічно" checked={period==='yearly'} onChange={() => setPeriod('yearly')} />
        <div style={{display:'flex',alignItems:'center',gap:10}}><Switch checked={yearly} onChange={setYearly} /><span style={{font:'var(--text-body-sm)'}}>IPv6</span></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
